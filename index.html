<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --bg: #08090f;
    --card: #0e0f1a;
    --card-hover: #13141f;
    --border: #1c1d2e;
    --accent: #d020c0;
    --accent2: #a010a0;
    --accent3: #e040d0;
    --accent-glow: rgba(208,32,192,0.3);
    --text: #e2e2ee;
    --muted: #6b6b8e;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ NAV ══ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    background: rgba(8,9,15,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: navIn 0.5s ease both;
  }

  @keyframes navIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }

  .logo-hex {
    width: 32px; height: 32px;
    animation: hexPulse 3s ease-in-out infinite;
  }

  @keyframes hexPulse {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(208,32,192,0.7)); }
    50%       { filter: drop-shadow(0 0 14px rgba(208,32,192,1)); }
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--white);
    letter-spacing: 0.06em;
  }

  .logo-text span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 2px;
    list-style: none;
  }

  .nav-links a {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 7px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
