<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGD Checker \u2014 CS2BGD31.RU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090f;
    --card: #0e0f1a;
    --card-hover: #13141f;
    --border: #1c1d2e;
    --accent: #d020c0;
    --accent2: #a010a0;
    --accent3: #e040d0;
    --accent-glow: rgba(208,32,192,0.3);
    --text: #e2e2ee;
    --muted: #6b6b8e;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    background: rgba(8,9,15,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    animation: navIn 0.5s ease both;
  }

  @keyframes navIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }

  .logo-hex {
    width: 32px; height: 32px;
    animation: hexPulse 3s ease-in-out infinite;
  }

  @keyframes hexPulse {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(208,32,192,0.7)); }
    50%       { filter: drop-shadow(0 0 14px rgba(208,32,192,1)); }
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--white);
    letter-spacing: 0.06em;
  }

  .logo-text span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 2px;
    list-style: none;
  }

  .nav-links a {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-radius: 7px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
    transition: color 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }

  .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.04); }

  .nav-links a.active {
    color: var(--white);
    background: var(--accent);
    box-shadow: 0 0 18px var(--accent-glow);
  }

  .nav-ico {
    width: 14px; height: 14px;
    opacity: 0.7;
  }

  #page-home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .hero-section {
    flex: 1;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 56px 0 0;
    min-height: 100vh;
  }

  .hero-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 70% 60%, rgba(20,30,80,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(208,32,192,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 0 0 10%;
    max-width: 600px;
    animation: heroIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }

  @keyframes heroIn {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(208,32,192,0.25);
    background: rgba(208,32,192,0.07);
    border-radius: 4px;
    padding: 4px 12px;
    margin-bottom: 28px;
  }

  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blinkDot 1.4s ease-in-out infinite;
  }

  @keyframes blinkDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .hero-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(3rem, 5.5vw, 5rem);
    font-weight: 700;
    line-height: 1.05;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 20px;
  }

  .hero-title .accent-line { color: var(--accent); }

  .hero-sub {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 440px;
    margin-bottom: 40px;
  }

  .hero-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 13px 30px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.02em;
    box-shadow: 0 0 28px var(--accent-glow);
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(208,32,192,0.5);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 13px 30px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    font-family: 'Exo 2', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-2px);
  }

  .btn-icon { width: 16px; height: 16px; opacity: 0.9; }

  .hero-visual {
    position: absolute;
    right: 0; bottom: 0;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
    animation: charIn 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;
  }

  @keyframes charIn {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .hero-char-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
  }

  .char-glow {
    position: absolute;
    bottom: 0;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(208,32,192,0.12) 0%, rgba(20,40,120,0.15) 50%, transparent 70%);
    filter: blur(40px);
    animation: charGlow 4s ease-in-out infinite;
  }

  @keyframes charGlow {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  .hero-grid {
    position: absolute;
    right: 5%; top: 50%;
    transform: translateY(-50%);
    width: 340px; height: 340px;
    opacity: 0.04;
    background-image:
      linear-gradient(rgba(208,32,192,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(208,32,192,1) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    border-radius: 8px;
    mask-image: radial-gradient(circle, black 30%, transparent 70%);
    -webkit-mask-image: radial-gradient(circle, black 30%, transparent 70%);
  }

  .hero-stats {
    position: absolute;
    bottom: 48px;
    left: 10%;
    display: flex;
    gap: 40px;
    animation: heroIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s both;
  }

  .stat-item { text-align: left; }

  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .stat-num span { color: var(--accent); }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  #page-main { display: none; padding-top: 56px; }
  #page-guide { display: none; padding-top: 56px; }
  #page-home  { display: flex; }

  .page-hero {
    text-align: center;
    padding: 64px 32px 48px;
    position: relative;
  }

  .page-hero::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 200px;
    background: radial-gradient(ellipse, rgba(208,32,192,0.1) 0%, transparent 65%);
    pointer-events: none;
  }

  .page-hero h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(2.2rem, 4vw, 3.2rem);
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 36px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .tab-btn {
    padding: 9px 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.03em;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 0 22px var(--accent-glow);
  }

  .tab-btn:not(.active) {
    background: transparent;
    color: var(--muted);
  }

  .tab-btn:not(.active):hover {
    background: rgba(255,255,255,0.03);
    color: var(--text);
    border-color: rgba(255,255,255,0.08);
  }

  .warning {
    max-width: 880px;
    margin: 28px auto 0;
    background: rgba(208,32,192,0.04);
    border: 1px solid rgba(208,32,192,0.12);
    border-radius: 10px;
    padding: 18px 24px;
    font-size: 0.83rem;
    line-height: 1.7;
    color: var(--muted);
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .warning-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .warning strong { color: var(--text); }

  .section { max-width: 1120px; margin: 48px auto 0; padding: 0 32px 80px; }

  .programs-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .program-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .program-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: border-color 0.3s;
    pointer-events: none;
  }

  .program-card:hover {
    background: var(--card-hover);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(208,32,192,0.12);
  }

  .program-card:hover::after { border-color: rgba(208,32,192,0.28); }

  .program-card h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 5px;
    transition: opacity 0.25s;
  }

  .program-card p {
    font-size: 0.79rem;
    color: var(--muted);
    line-height: 1.5;
    transition: opacity 0.25s;
  }

  .download-overlay {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: rgba(208,32,192,0.14);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 2;
  }

  .program-card:hover .download-overlay { opacity: 1; pointer-events: all; }
  .program-card:hover h3,
  .program-card:hover p { opacity: 0; }

  .dl-icon { width: 26px; height: 26px; color: var(--white); }

  .dl-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--white);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .download-overlay a {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    z-index: 3;
  }

  .sig-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: 10px;
    padding: 22px 26px;
    margin-bottom: 12px;
    position: relative;
    transition: border-color 0.25s, box-shadow 0.25s;
    animation: fadeUp 0.5s ease both;
  }

  .sig-card:hover {
    border-color: rgba(208,32,192,0.25);
    border-left-color: var(--accent);
    box-shadow: 0 6px 24px rgba(208,32,192,0.07);
  }

  .sig-card h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 3px;
  }

  .sig-desc {
    font-size: 0.79rem;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .sig-code {
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: #8888aa;
    line-height: 1.85;
    background: rgba(0,0,0,0.28
